<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  /* Base styles for the entire signature to control font and sizing */
  #sig-container {
    font-family: Arial, sans-serif;
    color: #333333;
    font-size: 14px;
    line-height: 1.4;
  }
  
  /* Link styles - customize the blue colors if you prefer */
  #sig-container a {
    color: #1a73e8; /* Default blue for links */
    text-decoration: none;
  }
  #sig-container a:hover {
    text-decoration: underline;
  }
</style>
</head>
<body>

<div id="sig-container" style="display: flex; align-items: flex-start; max-width: 600px;">
  
  <div style="flex: 0 0 auto; margin-right: 20px;">
    <img src="https://raw.githubusercontent.com/preetam-karri/sig/refs/heads/main/pklink.png" 
         alt="Preetam Karri" 
         style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; display: block;">
  </div>

  <div style="flex: 0 0 auto; width: 1px; height: 100px; background-color: #e0e0e0; margin-right: 20px;"></div>

  <div style="flex: 1 1 auto;">
    
    <div style="margin-bottom: 12px;">
      <span style="font-weight: bold; font-size: 16px; text-transform: uppercase; color: #000000;">Preetam KARRI</span><br>
      <span style="color: #666666; font-style: italic;">Chief of Staff</span>
    </div>
    
    <div style="margin-bottom: 12px;">
      <a href="https://fixeets.com" target="_blank" style="font-weight: bold;">Fixeets.com</a><br>
      </div>
    
    <div style="display: flex; align-items: center; gap: 15px;">
      <a href="https://www.linkedin.com/in/preetamkarri/" target="_blank" title="View my LinkedIn profile">
        <img src="https://cdn1.iconfinder.com/data/icons/logotypes/32/circle-linkedin-512.png" 
             alt="LinkedIn Logo" 
             style="width: 24px; height: 24px; display: block; border: 0;">
      </a>
      
      <a href="https://fixeets.com" target="_blank" title="Visit Fixeets.com">
        <img src="https://raw.githubusercontent.com/preetam-karri/sig/refs/heads/main/logo.png" 
             alt="Fixeets Logo" 
             style="height: 24px; max-width: 150px; display: block; border: 0;">
      </a>
    </div>

  </div>
</div>

</body>
</html>
